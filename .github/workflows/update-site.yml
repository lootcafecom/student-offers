name: Update Student Stash data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new offers from all sources
        run: python3 scripts/update_offers.py

      - name: Check live status of every offer link
        run: python3 scripts/check_links.py

      - name: Commit changes if data actually changed
        run: |
          git config user.name "student-stash-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/offers_data.json docs/meta.json
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "Auto-update offers data ($(date -u +%Y-%m-%d))"
            git push
          fi
